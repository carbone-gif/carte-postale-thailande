<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Voyage Thaïlande 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="hero" id="hero">
  <div class="hero-content">
    <p class="hero-sub" id="hero-count"></p>
    <h1>Voyage Thaïlande 2026</h1>
  </div>
</section>

<div class="wrap wrap-wide">
  <p class="subtitle" id="subtitle">Chargement…</p>
  <div id="content"></div>
</div>

<script src="config.js"></script>
<script>
const HERO_PHOTOS = [
  "assets/thai-waterfall.jpg",
  "assets/thai-islands.jpg",
  "assets/thai-sunset-swing.jpg",
  "assets/thai-boats.jpg",
  "assets/thai-temple-garden.jpg",
  "assets/thai-hammock.jpg",
  "assets/thai-lanterns.jpg",
  "assets/thai-buddha.jpg",
];

document.getElementById("hero").style.backgroundImage =
  `url(${HERO_PHOTOS[Math.floor(Math.random() * HERO_PHOTOS.length)]})`;

function formatDate(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
}

function carteHTML(carte, { isJour }) {
  return `
    <div class="carte ${isJour ? "jour" : ""}" data-id="${carte.id}">
      <div class="carte-inner">
        <div class="carte-face front">
          <span class="date-badge">${formatDate(carte.date)}</span>
          <span class="flip-hint">Toucher pour lire ↻</span>
          <img src="${carte.photo_url}" alt="Photo du ${carte.date}" loading="lazy">
        </div>
        <div class="carte-face back">
          <div class="stamp">✈️</div>
          <div class="lieu">${carte.lieu}</div>
          <div class="texte">${carte.texte.replace(/</g, "&lt;")}</div>
        </div>
      </div>
    </div>
  `;
}

async function charger() {
  const params = new URLSearchParams(location.search);
  const token = params.get("t");
  const subtitle = document.getElementById("subtitle");
  const heroCount = document.getElementById("hero-count");
  const content = document.getElementById("content");

  if (!token) {
    subtitle.textContent = "Lien incomplet.";
    return;
  }

  try {
    const res = await fetch(`${CONFIG.SUPABASE_FUNCTIONS_URL}/get-gallery?t=${encodeURIComponent(token)}`);
    if (res.status === 401) {
      subtitle.textContent = "Ce lien n'est plus valide.";
      return;
    }
    const data = await res.json();
    const cartes = data.cartes || [];

    if (cartes.length === 0) {
      subtitle.textContent = "";
      content.innerHTML = `<div class="empty">La première carte arrive bientôt 🙂</div>`;
      return;
    }

    subtitle.textContent = "";
    heroCount.textContent = `${cartes.length} carte${cartes.length > 1 ? "s" : ""} reçue${cartes.length > 1 ? "s" : ""}`;

    const [jour, ...historique] = cartes;
    let html = `<div class="carte-jour-wrap">${carteHTML(jour, { isJour: true })}</div>`;

    if (historique.length > 0) {
      html += `<div class="historique-titre">Cartes précédentes</div>`;
      html += `<div class="grille">`;
      html += historique.map((c) => carteHTML(c, { isJour: false })).join("");
      html += `</div>`;
    }

    content.innerHTML = html;

    content.querySelectorAll(".carte").forEach((el) => {
      el.addEventListener("click", () => el.classList.toggle("flipped"));
    });
  } catch (e) {
    subtitle.textContent = "Impossible de charger les cartes pour le moment.";
  }
}

charger();
</script>
</body>
</html>
